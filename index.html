<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Test Edukacyjny</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h2 { margin-top: 0; color: #333; line-height: 1.4; }
        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { width: 100%; border: none; padding: 14px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; transition: background 0.2s; }
        .btn-yes { background: #28a745; }
        .btn-yes:hover { background: #218838; }
        .btn-no { background: #dc3545; }
        .btn-no:hover { background: #c82333; }
        .btn-dontknow { background: #6c757d; }
        .btn-dontknow:hover { background: #5a6268; }
        #next-btn { background: #007bff; display: none; margin-top: 200px; text-align: center; }
        #next-btn:hover { background: #0056b3; }
        #score-container { text-align: center; font-size: 22px; font-weight: bold; }
        .feedback { font-size: 18px; font-weight: bold; margin-top: 15px; text-align: center; min-height: 24px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz">
        <h2 id="question">Pytanie ładowanie...</h2>
        <div class="btn-container" id="answer-buttons">
            <button id="btn-true" class="btn btn-yes" onclick="selectAnswer(true)">TAK</button>
            <button id="btn-false" class="btn btn-no" onclick="selectAnswer(false)">NIE</button>
            <button id="btn-skip" class="btn btn-dontknow" onclick="selectAnswer(null)">NIE WIEM</button>
        </div>
        <div id="feedback-message" class="feedback"></div>
        <button id="next-btn" class="btn">Następne pytanie</button>
    </div>
    <div id="score-container" style="display: none;"></div>
</div>

<script src="pytanya.js"></script>
</body>
</html>
