<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egzaminator & Eliminacja</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #151f32;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --neutral: #4b5563;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 24px;
        }

        .quiz-container { 
            background: var(--container-bg); 
            padding: 32px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 1400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin: 0 auto;
        }

        .quiz-screen, .score-screen { max-width: 600px; margin: 0 auto; }
        .score-screen { max-width: 800px; }

        h2 { font-size: 24px; font-weight: 600; margin-bottom: 24px; line-height: 1.5; text-align: center; }
        
        .setup-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .setup-group label { color: var(--text-muted); font-size: 15px; text-align: center; }
        
        input[type="number"] {
            background: var(--bg-color);
            border: 2px solid #202e48;
            color: var(--text-color);
            padding: 14px;
            border-radius: 6px;
            font-size: 18px;
            outline: none;
            text-align: center;
        }
        input[type="number"]:focus { border-color: var(--primary); }

        .radio-mode-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .radio-option { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 16px; }
        .radio-option input { width: 18px; height: 18px; cursor: pointer; }

        .checkbox-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; cursor: pointer; user-select: none; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { font-size: 16px; color: var(--text-color); cursor: pointer; }

        .flashcard-stats-box {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 6px;
            max-width: 400px;
            margin: 0 auto 20px auto;
            text-align: center;
            font-size: 14px;
            border: 1px solid #202e48;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .btn { 
            width: 100%; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            color: white; 
            transition: transform 0.1s, opacity 0.2s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { pointer-events: none; }

        .btn-start { background: var(--primary); max-width: 400px; margin: 0 auto; display: block; }
        .btn-start:hover { background: var(--primary-hover); }
        .btn-reset-flash { background: #374151; max-width: 400px; margin: 12px auto 0 auto; display: block; font-size: 14px; padding: 10px; }
        .btn-reset-flash:hover { background: #4b5563; }
        
        .btn-yes { background: var(--success); }
        .btn-no { background: var(--danger); }
        .btn-dontknow { background: var(--neutral); }
        
        #next-btn { background: var(--primary); margin-top: 24px; display: none; }
        #next-btn:hover { background: var(--primary-hover); }

        .feedback { font-size: 16px; font-weight: 600; margin-top: 20px; text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        
        .progress-bar { height: 4px; background: #202e48; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        .preview-box { margin-top: 40px; border-top: 1px solid #202e48; padding-top: 24px; }
        .preview-title { font-size: 18px; color: var(--text-muted); margin-bottom: 16px; text-align: center; font-weight: 600; }
        .preview-list { max-height: 500px; overflow-y: auto; padding-right: 8px; display: flex; flex-direction: column; gap: 12px; }
        .preview-list::-webkit-scrollbar { width: 6px; }
        .preview-list::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        .preview-list::-webkit-scrollbar-thumb { background: #202e48; border-radius: 4px; }

        .preview-item { background: var(--bg-color); padding: 16px; border-radius: 8px; font-size: 15px; line-height: 1.5; border-left: 4px solid #202e48; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .preview-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; background: #202e48; color: var(--text-muted); white-space: nowrap; }

        .report-box { margin-top: 32px; border-top: 1px solid #202e48; padding-top: 24px; text-align: left; }
        .report-item { background: var(--bg-color); padding: 16px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--neutral); }
        .report-item.rep-correct { border-left-color: var(--success); }
        .report-item.rep-wrong { border-left-color: var(--danger); }
        .report-item.rep-skipped { border-left-color: var(--neutral); }
        .report-details { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 13px; color: var(--text-muted); }
        .report-pts { font-weight: bold; }
        .rep-correct .report-pts { color: var(--success); }
        .rep-wrong .report-pts { color: var(--danger); }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .quiz-container { padding: 16px; }
            .preview-item { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="setup-screen">
        <h2>Skonfiguruj sesję</h2>
        
        <div class="radio-mode-group">
            <label class="radio-option">
                <input type="radio" name="app-mode" id="mode-exam" checked onchange="toggleModeUI()">
                <span>Tryb Egzaminu</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="app-mode" id="mode-flashcards" onchange="toggleModeUI()">
                <span>Tryb Eliminacji (Fiszki)</span>
            </label>
        </div>

        <div class="setup-group">
            <label id="range-label" for="question-count">Ile pytań wylosować?</label>
            <input type="number" id="question-count" min="1" value="10">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="instant-feedback" checked>
            <label for="instant-feedback">Pokazuj poprawne odpowiedzi od razu</label>
        </div>

        <div id="flashcard-stats" class="flashcard-stats-box" style="display: none;">
            <div>Pozostało do nauki: <strong id="flash-rem" style="color: var(--primary);">0</strong></div>
            <div style="margin-top: 4px;">Opanowane (usunięte z puli): <strong id="flash-known" style="color: var(--success);">0</strong></div>
        </div>

        <button id="start-btn" class="btn btn-start">Rozpocznij naukę</button>
        <button id="reset-flash-btn" class="btn btn-reset-flash" style="display: none;">Zresetuj postęp nauki (Przywróć wszystkie)</button>

        <div class="preview-box">
            <div class="preview-title">Wszystkie pytania w bazie:</div>
            <div id="questions-preview" class="preview-list"></div>
        </div>
    </div>

    <div id="quiz-screen" class="quiz-screen" style="display: none;">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <h2 id="question">Ładowanie pytania...</h2>
        
        <div class="btn-container">
            <button id="btn-true" class="btn btn-yes">TAK</button>
            <button id="btn-false" class="btn btn-no">NIE</button>
            <button id="btn-skip" class="btn btn-dontknow">NIE WIEM</button>
        </div>

        <div id="feedback-message" class="feedback"></div>
        <button id="next-btn" class="btn">Następne pytanie</button>
    </div>

    <div id="score-container" class="score-screen" style="display: none;"></div>
</div>

<script src="pytania.js"></script>
</body>
</html>
